<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dootee - แหล่งรวมที่ดูหนัง</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <header>
        <h1>🎬 Dootee</h1>
        <p>ค้นหาว่าหนังเรื่องโปรดของคุณ ดูได้ที่แพลตฟอร์มไหน</p>
        
        <div class="filter-buttons">
            <button onclick="filterMovies('All')">ทั้งหมด</button>
            <button onclick="filterMovies('Netflix')">Netflix</button>
            <button onclick="filterMovies('Disney+')">Disney+</button>
            <button onclick="filterMovies('Amazon Prime')">Amazon Prime</button>
            <button onclick="filterMovies('Apple TV+')">Apple TV+</button>
        </div>
    </header>

    <main>
        <div id="movie-container" class="movie-grid">
            <p>กำลังโหลดข้อมูล...</p>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
