<style>
  :root {
    --bg: #060b13; --surface: #0b121e; --card: #111a2a; --border: #1e293b;
    --text: #f8fafc; --muted: #94a3b8; --accent: #3b82f6; --accent-hover: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Prompt', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; padding: 16px 24px; }
  .header-container { max-width: 1600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .brand-group { display: flex; flex-direction: column; }
  .logo { font-size: 2rem; font-weight: 700; color: var(--text); text-decoration: none; line-height: 1.1; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.85rem; color: var(--muted); font-weight: 300; margin-top: 2px; }

  .search-wrap { flex: 1; max-width: 500px; position: relative; }
  .search-wrap svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #searchInput { width: 100%; padding: 12px 16px 12px 48px; background: rgba(30,41,59,0.5); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Prompt'; font-size: 1rem; outline: none; }
  #searchInput:focus { background: var(--card); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }

  .auth-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; font-family: 'Prompt'; cursor: pointer; }
  .auth-btn:hover { border-color: var(--text); color: var(--text); }
  .auth-btn.logged-in { background: rgba(239,68,68,0.1); color: #f87171; border-color: rgba(239,68,68,0.3); }

  /* LAYOUT */
  .layout-wrapper { display: flex; max-width: 1600px; margin: 32px auto 60px; padding: 0 24px; gap: 24px; align-items: flex-start; }
  .main-content { flex-grow: 1; min-width: 0; }
  .sidebar { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 100px; }
  @media(max-width: 1100px) { .sidebar { display: none; } }

  /* ADS */
  .ad-item { width: 100%; min-height: 250px; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; position: relative; overflow: hidden; display:flex; align-items:center; justify-content:center; color:var(--muted); text-align:center;}
  .ad-item img { width: 100%; height: 100%; object-fit: cover; }
  .del-ad-btn { position: absolute; top: 8px; right: 8px; background: rgba(239,68,68,0.9); color: white; border: none; border-radius: 6px; padding: 4px 8px; font-size: 0.75rem; cursor: pointer; z-index: 10; }

  /* FILTER */
  .controls-bar { margin-bottom: 24px; }
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filter-label { color: var(--muted); font-size: 0.95rem; margin-right: 8px; }
  .pill { padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; transition: .2s; }
  .pill.active { background: rgba(59,130,246,0.1); border-color: var(--accent); color: var(--accent); }

  /* GRID & CARDS */
  .stats-row { font-size: 0.9rem; color: var(--muted); margin-bottom: 24px; }
  .stats-row span { color: var(--text); font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; transition: .3s; }
