<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ดูได้ที่ไหน? — ค้นหาหนังตาม Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --muted: #888899;
    --accent: #e8c547;

    --netflix: #e50914;
    --disney: #1a78c2;
    --hbo: #6b2fa0;
    --prime: #00a8e1;
    --apple: #555;
    --hulu: #1ce783;
    --other: #ff6b35;
    --youtube: #ff0000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(232,197,71,0.08) 0%, transparent 60%);
  }

  /* HEADER */
  header {
    padding: 48px 24px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 2px;
    background: var(--accent);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    letter-spacing: 4px;
    line-height: 1;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .tagline {
    margin-top: 8px;
    color: var(--muted);
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 2px;
  }

  /* CONTROLS */
  .controls {
    max-width: 1100px;
    margin: 36px auto 0;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 16px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    padding: 16px 16px 16px 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 1.1rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,197,71,0.1);
  }
  #searchInput::placeholder { color: var(--muted); }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    color: var(--muted);
    font-size: .85rem;
    margin-right: 4px;
    white-space: nowrap;
  }

  .pill {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Sarabun', sans-serif;
    font-size: .88rem;
    cursor: pointer;
    transition: all .18s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #111;
    font-weight: 700;
  }

  .stats-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 2px;
  }
  #resultCount {
    font-size: .9rem;
    color: var(--muted);
  }
  #resultCount span { color: var(--accent); font-weight: 700; }

  /* GRID */
  .grid {
    max-width: 1100px;
    margin: 24px auto 60px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    cursor: default;
    animation: fadeUp .35s ease both;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(232,197,71,.35);
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }
  .movie-title {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.35;
    flex: 1;
  }
  .movie-year {
    font-size: .82rem;
    color: var(--muted);
    white-space: nowrap;
    padding-top: 2px;
  }

  .movie-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .badge {
    font-size: .75rem;
    padding: 3px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.06);
    color: var(--muted);
  }

  .platforms {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .platform-tag {
    font-size: .78rem;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 6px;
    letter-spacing: .5px;
  }
  .platform-tag.netflix   { background: rgba(229,9,20,.15);   color: #ff4d5a; border: 1px solid rgba(229,9,20,.3); }
  .platform-tag.disney    { background: rgba(26,120,194,.15);  color: #4daaff; border: 1px solid rgba(26,120,194,.3); }
  .platform-tag.hbo       { background: rgba(107,47,160,.15); color: #b47eff; border: 1px solid rgba(107,47,160,.3); }
  .platform-tag.prime     { background: rgba(0,168,225,.15);  color: #4dcfff; border: 1px solid rgba(0,168,225,.3); }
  .platform-tag.apple     { background: rgba(200,200,200,.1); color: #ccc;    border: 1px solid rgba(200,200,200,.2); }
  .platform-tag.hulu      { background: rgba(28,231,131,.1);  color: #4df5a0; border: 1px solid rgba(28,231,131,.25); }
  .platform-tag.youtube   { background: rgba(255,0,0,.12);    color: #ff5555; border: 1px solid rgba(255,0,0,.25); }
  .platform-tag.other     { background: rgba(255,107,53,.12); color: #ff8855; border: 1px solid rgba(255,107,53,.25); }

  /* EMPTY */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty svg { margin-bottom: 16px; opacity: .4; }
  .empty p { font-size: 1.1rem; }

  /* ADD FORM */
  .add-section {
    max-width: 700px;
    margin: 0 auto 60px;
    padding: 0 24px;
  }
  details {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  summary {
    padding: 18px 24px;
    cursor: pointer;
    font-weight: 600;
    font-size: 1rem;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  summary::marker { display: none; content: ''; }
  summary svg { color: var(--accent); flex-shrink: 0; }
  .form-body {
    padding: 0 24px 24px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  @media(max-width:520px){ .form-grid { grid-template-columns: 1fr; } }

  .field label {
    display: block;
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: .95rem;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--card); }

  .platform-checkboxes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 6px;
  }
  .plat-cb {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: .85rem;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .plat-cb input { display: none; }
  .plat-cb.checked { border-color: var(--accent); background: rgba(232,197,71,.08); color: var(--accent); }

  .btn-add {
    margin-top: 16px;
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #111;
    font-family: 'Sarabun', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn-add:hover { opacity: .9; }
  .btn-add:active { transform: scale(.98); }

  /* EDIT / DELETE on card */
  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 14px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .btn-edit, .btn-del {
    padding: 5px 14px;
    border-radius: 6px;
    font-family: 'Sarabun', sans-serif;
    font-size: .8rem;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all .15s;
  }
  .btn-edit { background: transparent; color: var(--muted); }
  .btn-edit:hover { border-color: var(--accent); color: var(--accent); }
  .btn-del  { background: transparent; color: var(--muted); margin-left: auto; }
  .btn-del:hover  { border-color: #e55; color: #e55; }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { font-size: 1.2rem; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-cancel {
    flex: 1; padding: 11px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Sarabun', sans-serif;
    cursor: pointer;
  }
  .btn-save {
    flex: 2; padding: 11px;
    background: var(--accent);
    color: #111;
    font-family: 'Sarabun', sans-serif;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: .82rem;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo">ดู<span>ที่ไหน</span>?</div>
  <div class="tagline">ค้นหาหนัง · ซีรีส์ · และดูได้ที่ platform ใด</div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="ค้นหาชื่อหนัง หรือซีรีส์...">
  </div>
  <div class="filter-row">
    <span class="filter-label">Platform:</span>
    <button class="pill active" data-platform="all">ทั้งหมด</button>
    <button class="pill" data-platform="netflix">Netflix</button>
    <button class="pill" data-platform="disney">Disney+</button>
    <button class="pill" data-platform="hbo">HBO Max</button>
    <button class="pill" data-platform="prime">Prime</button>
    <button class="pill" data-platform="apple">Apple TV+</button>
    <button class="pill" data-platform="hulu">Hulu</button>
    <button class="pill" data-platform="youtube">YouTube</button>
    <button class="pill" data-platform="other">อื่นๆ</button>
  </div>
  <div class="stats-row">
    <div id="resultCount">พบ <span id="countNum">0</span> เรื่อง</div>
  </div>
</div>

<div class="grid" id="movieGrid"></div>

<!-- ADD MOVIE -->
<div class="add-section">
  <details id="addDetails">
    <summary>
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      เพิ่มหนัง / ซีรีส์
    </summary>
    <div class="form-body">
      <div class="form-grid">
        <div class="field" style="grid-column:1/-1">
          <label>ชื่อเรื่อง *</label>
          <input type="text" id="f_title" placeholder="เช่น Oppenheimer">
        </div>
        <div class="field">
          <label>ชื่อภาษาไทย</label>
          <input type="text" id="f_title_th" placeholder="เช่น ออพเพนไฮเมอร์">
        </div>
        <div class="field">
          <label>ปีที่ออก</label>
          <input type="number" id="f_year" placeholder="2024" min="1900" max="2099">
        </div>
        <div class="field">
          <label>ประเภท</label>
          <select id="f_genre">
            <option value="">-- เลือก --</option>
            <option>Action</option><option>Comedy</option><option>Drama</option>
            <option>Horror</option><option>Romance</option><option>Sci-Fi</option>
            <option>Thriller</option><option>Animation</option><option>Documentary</option>
            <option>Fantasy</option><option>Crime</option><option>Series</option>
          </select>
        </div>
        <div class="field">
          <label>ประเทศ</label>
          <input type="text" id="f_country" placeholder="เช่น US, TH, KR">
        </div>
      </div>
      <div class="field">
        <label>Platform ที่ดูได้ * (เลือกได้หลาย)</label>
        <div class="platform-checkboxes" id="platCBs">
          <label class="plat-cb"><input type="checkbox" value="netflix">Netflix</label>
          <label class="plat-cb"><input type="checkbox" value="disney">Disney+</label>
          <label class="plat-cb"><input type="checkbox" value="hbo">HBO Max</label>
          <label class="plat-cb"><input type="checkbox" value="prime">Prime Video</label>
          <label class="plat-cb"><input type="checkbox" value="apple">Apple TV+</label>
          <label class="plat-cb"><input type="checkbox" value="hulu">Hulu</label>
          <label class="plat-cb"><input type="checkbox" value="youtube">YouTube</label>
          <label class="plat-cb"><input type="checkbox" value="other">อื่นๆ</label>
        </div>
      </div>
      <button class="btn-add" onclick="addMovie()">+ เพิ่มเรื่องนี้</button>
    </div>
  </details>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3>✏️ แก้ไขข้อมูล</h3>
    <input type="hidden" id="e_id">
    <div class="form-grid">
      <div class="field" style="grid-column:1/-1">
        <label>ชื่อเรื่อง *</label>
        <input type="text" id="e_title">
      </div>
      <div class="field">
        <label>ชื่อภาษาไทย</label>
        <input type="text" id="e_title_th">
      </div>
      <div class="field">
        <label>ปีที่ออก</label>
        <input type="number" id="e_year">
      </div>
      <div class="field">
        <label>ประเภท</label>
        <select id="e_genre">
          <option value="">-- เลือก --</option>
          <option>Action</option><option>Comedy</option><option>Drama</option>
          <option>Horror</option><option>Romance</option><option>Sci-Fi</option>
          <option>Thriller</option><option>Animation</option><option>Documentary</option>
          <option>Fantasy</option><option>Crime</option><option>Series</option>
        </select>
      </div>
      <div class="field">
        <label>ประเทศ</label>
        <input type="text" id="e_country">
      </div>
    </div>
    <div class="field">
      <label>Platform</label>
      <div class="platform-checkboxes" id="editPlatCBs">
        <label class="plat-cb"><input type="checkbox" value="netflix">Netflix</label>
        <label class="plat-cb"><input type="checkbox" value="disney">Disney+</label>
        <label class="plat-cb"><input type="checkbox" value="hbo">HBO Max</label>
        <label class="plat-cb"><input type="checkbox" value="prime">Prime Video</label>
        <label class="plat-cb"><input type="checkbox" value="apple">Apple TV+</label>
        <label class="plat-cb"><input type="checkbox" value="hulu">Hulu</label>
        <label class="plat-cb"><input type="checkbox" value="youtube">YouTube</label>
        <label class="plat-cb"><input type="checkbox" value="other">อื่นๆ</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-save" onclick="saveEdit()">💾 บันทึก</button>
    </div>
  </div>
</div>

<footer>ข้อมูลบันทึกในเครื่องของคุณ (localStorage) · สร้างด้วย ❤️</footer>

<script>
const STORAGE_KEY = 'dutiinai_movies';

// --- SAMPLE DATA ---
const sampleData = [
  { id: 1, title: "Oppenheimer", title_th: "ออพเพนไฮเมอร์", year: 2023, genre: "Drama", country: "US", platforms: ["prime","other"] },
  { id: 2, title: "Barbie", title_th: "บาร์บี้", year: 2023, genre: "Comedy", country: "US", platforms: ["hbo"] },
  { id: 3, title: "The Bear", title_th: "เดอะ แบร์", year: 2023, genre: "Drama", country: "US", platforms: ["disney"] },
  { id: 4, title: "Wednesday", title_th: "เวนสเดย์", year: 2022, genre: "Horror", country: "US", platforms: ["netflix"] },
  { id: 5, title: "Avatar: The Way of Water", title_th: "อวตาร: วิถีแห่งสายน้ำ", year: 2022, genre: "Sci-Fi", country: "US", platforms: ["disney"] },
  { id: 6, title: "The Last of Us", title_th: "เดอะ ลาสต์ ออฟ อัส", year: 2023, genre: "Drama", country: "US", platforms: ["hbo"] },
  { id: 7, title: "Squid Game", title_th: "สควิดเกม", year: 2021, genre: "Thriller", country: "KR", platforms: ["netflix"] },
  { id: 8, title: "Everything Everywhere All at Once", title_th: "", year: 2022, genre: "Sci-Fi", country: "US", platforms: ["prime","other"] },
  { id: 9, title: "Top Gun: Maverick", title_th: "ท็อปกัน: มาเวอริก", year: 2022, genre: "Action", country: "US", platforms: ["prime","apple"] },
  { id: 10, title: "Strange World", title_th: "", year: 2022, genre: "Animation", country: "US", platforms: ["disney"] },
  { id: 11, title: "Tár", title_th: "", year: 2022, genre: "Drama", country: "US", platforms: ["prime"] },
  { id: 12, title: "Knives Out: Glass Onion", title_th: "แก้ว หัวหอม คดีปริศนา", year: 2022, genre: "Thriller", country: "US", platforms: ["netflix"] },
];

// Load from storage or use sample
function loadMovies() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : sampleData;
}
function saveMovies(movies) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(movies));
}

let movies = loadMovies();
let filterPlatform = 'all';
let searchQ = '';

// Render
function render() {
  const grid = document.getElementById('movieGrid');
  let filtered = movies.filter(m => {
    const q = searchQ.toLowerCase();
    const matchSearch = !q ||
      m.title.toLowerCase().includes(q) ||
      (m.title_th && m.title_th.toLowerCase().includes(q)) ||
      (m.genre && m.genre.toLowerCase().includes(q)) ||
      String(m.year).includes(q);
    const matchPlatform = filterPlatform === 'all' || m.platforms.includes(filterPlatform);
    return matchSearch && matchPlatform;
  });

  document.getElementById('countNum').textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>ไม่พบเรื่องที่ค้นหา</p>
    </div>`;
    return;
  }

  const platLabel = { netflix:'Netflix', disney:'Disney+', hbo:'HBO Max', prime:'Prime Video', apple:'Apple TV+', hulu:'Hulu', youtube:'YouTube', other:'อื่นๆ' };

  grid.innerHTML = filtered.map((m, i) => `
    <div class="card" style="animation-delay:${Math.min(i*0.04,0.4)}s">
      <div class="card-top">
        <div class="movie-title">${m.title}${m.title_th ? `<br><span style="font-weight:400;font-size:.88rem;color:var(--muted)">${m.title_th}</span>` : ''}</div>
        ${m.year ? `<div class="movie-year">${m.year}</div>` : ''}
      </div>
      <div class="movie-meta">
        ${m.genre ? `<span class="badge">${m.genre}</span>` : ''}
        ${m.country ? `<span class="badge">${m.country}</span>` : ''}
      </div>
      <div class="platforms">
        ${m.platforms.map(p => `<span class="platform-tag ${p}">${platLabel[p]||p}</span>`).join('')}
      </div>
      <div class="card-actions">
        <button class="btn-edit" onclick="openEdit(${m.id})">✏️ แก้ไข</button>
        <button class="btn-del"  onclick="deleteMovie(${m.id})">🗑️ ลบ</button>
      </div>
    </div>
  `).join('');
}

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

// Filter pills
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterPlatform = btn.dataset.platform;
    render();
  });
});

// Checkbox toggle styling
function initCBs(container) {
  container.querySelectorAll('.plat-cb').forEach(label => {
    const cb = label.querySelector('input');
    cb.addEventListener('change', () => {
      label.classList.toggle('checked', cb.checked);
    });
  });
}
initCBs(document.getElementById('platCBs'));
initCBs(document.getElementById('editPlatCBs'));

// ADD
function addMovie() {
  const title = document.getElementById('f_title').value.trim();
  if (!title) { alert('กรุณาใส่ชื่อเรื่อง'); return; }
  const platforms = [...document.querySelectorAll('#platCBs input:checked')].map(c => c.value);
  if (!platforms.length) { alert('กรุณาเลือกอย่างน้อย 1 platform'); return; }

  const movie = {
    id: Date.now(),
    title,
    title_th: document.getElementById('f_title_th').value.trim(),
    year: parseInt(document.getElementById('f_year').value) || null,
    genre: document.getElementById('f_genre').value,
    country: document.getElementById('f_country').value.trim(),
    platforms
  };
  movies.unshift(movie);
  saveMovies(movies);

  // reset
  ['f_title','f_title_th','f_year','f_country'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_genre').value = '';
  document.querySelectorAll('#platCBs input').forEach(cb => { cb.checked = false; cb.closest('.plat-cb').classList.remove('checked'); });
  document.getElementById('addDetails').removeAttribute('open');
  render();
}

// DELETE
function deleteMovie(id) {
  if (!confirm('ลบเรื่องนี้?')) return;
  movies = movies.filter(m => m.id !== id);
  saveMovies(movies);
  render();
}

// EDIT
function openEdit(id) {
  const m = movies.find(x => x.id === id);
  if (!m) return;
  document.getElementById('e_id').value = id;
  document.getElementById('e_title').value = m.title;
  document.getElementById('e_title_th').value = m.title_th || '';
  document.getElementById('e_year').value = m.year || '';
  document.getElementById('e_genre').value = m.genre || '';
  document.getElementById('e_country').value = m.country || '';
  document.querySelectorAll('#editPlatCBs input').forEach(cb => {
    cb.checked = m.platforms.includes(cb.value);
    cb.closest('.plat-cb').classList.toggle('checked', cb.checked);
  });
  document.getElementById('editOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('editOverlay').classList.remove('open');
}
function saveEdit() {
  const id = parseInt(document.getElementById('e_id').value);
  const title = document.getElementById('e_title').value.trim();
  if (!title) { alert('กรุณาใส่ชื่อเรื่อง'); return; }
  const platforms = [...document.querySelectorAll('#editPlatCBs input:checked')].map(c => c.value);
  if (!platforms.length) { alert('กรุณาเลือกอย่างน้อย 1 platform'); return; }
  const idx = movies.findIndex(m => m.id === id);
  movies[idx] = { ...movies[idx], title, title_th: document.getElementById('e_title_th').value.trim(),
    year: parseInt(document.getElementById('e_year').value)||null,
    genre: document.getElementById('e_genre').value,
    country: document.getElementById('e_country').value.trim(), platforms };
  saveMovies(movies);
  closeModal();
  render();
}
document.getElementById('editOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

render();
</script>
</body>
</html>
