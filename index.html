<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dootee — ดูอะไร ดูที่ไหน dootee นี่</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-analytics-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<style>
  :root {
    --bg: #060b13; --surface: #0b121e; --card: #111a2a; --border: #1e293b;
    --text: #f8fafc; --muted: #94a3b8; --accent: #3b82f6; --accent-hover: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Prompt', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; padding: 16px 24px; }
  .header-container { max-width: 1600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .brand-group { display: flex; flex-direction: column; }
  .logo { font-size: 2rem; font-weight: 700; color: var(--text); text-decoration: none; line-height: 1.1; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.85rem; color: var(--muted); font-weight: 300; margin-top: 2px; }

  .search-wrap { flex: 1; max-width: 500px; position: relative; }
  .search-wrap svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #searchInput { width: 100%; padding: 12px 16px 12px 48px; background: rgba(30,41,59,0.5); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Prompt'; font-size: 1rem; outline: none; }
  #searchInput:focus { background: var(--card); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }

  .auth-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; font-family: 'Prompt'; cursor: pointer; }
  .auth-btn:hover { border-color: var(--text); color: var(--text); }
  .auth-btn.logged-in { background: rgba(239,68,68,0.1); color: #f87171; border-color: rgba(239,68,68,0.3); }

  /* LAYOUT */
  .layout-wrapper { display: flex; max-width: 1600px; margin: 32px auto 60px; padding: 0 24px; gap: 24px; align-items: flex-start; }
  .main-content { flex-grow: 1; min-width: 0; }
  .sidebar { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 100px; }
  @media(max-width: 1100px) { .sidebar { display: none; } }

  /* ADS */
  .ad-item { width: 100%; min-height: 250px; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; position: relative; overflow: hidden; display:flex; align-items:center; justify-content:center; color:var(--muted); text-align:center;}
  .ad-item img { width: 100%; height: 100%; object-fit: cover; }
  .del-ad-btn { position: absolute; top: 8px; right: 8px; background: rgba(239,68,68,0.9); color: white; border: none; border-radius: 6px; padding: 4px 8px; font-size: 0.75rem; cursor: pointer; z-index: 10; }

  /* FILTER */
  .controls-bar { margin-bottom: 24px; }
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filter-label { color: var(--muted); font-size: 0.95rem; margin-right: 8px; }
  .pill { padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; transition: .2s; }
  .pill.active { background: rgba(59,130,246,0.1); border-color: var(--accent); color: var(--accent); }

  /* GRID & CARDS */
  .stats-row { font-size: 0.9rem; color: var(--muted); margin-bottom: 24px; }
  .stats-row span { color: var(--text); font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; transition: .3s; }
  .card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
  .card-poster { width: 100%; aspect-ratio: 2/3; background: #0b121e; border-radius: 8px; margin-bottom: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
  .card-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
  .card:hover .card-poster img { transform: scale(1.08); }
  .no-poster { color: var(--muted); font-size: 0.8rem; text-align: center; }
  
  .card-top { flex-grow: 1; margin-bottom: 10px; }
  .movie-title { font-size: 1rem; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .movie-th { font-size: 0.75rem; color: var(--muted); }
  .movie-year { display: inline-block; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); margin-top: 4px; }
  .badge { font-size: 0.65rem; padding: 3px 6px; border-radius: 6px; background: rgba(148,163,184,0.1); color: var(--muted); margin-right:4px;}
  .platforms { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; margin-top:8px;}
  .platform-tag { font-size: 0.6rem; font-weight: 600; padding: 3px 6px; border-radius: 4px; }
  .platform-tag.netflix { background: rgba(229,9,20,.15); color: #ff6b75; border: 1px solid rgba(229,9,20,.3); }
  .platform-tag.disney { background: rgba(26,120,194,.15); color: #60a5fa; border: 1px solid rgba(26,120,194,.3); }
  .platform-tag.hbo { background: rgba(107,47,160,.15); color: #c084fc; border: 1px solid rgba(107,47,160,.3); }
  .platform-tag.prime { background: rgba(0,168,225,.15); color: #38bdf8; border: 1px solid rgba(0,168,225,.3); }
  .audio-tag { font-size: 0.6rem; padding: 2px 4px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); margin-right:4px;}
  
  .card-actions { display: flex; gap: 4px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .btn-edit, .btn-del { flex: 1; padding: 4px 0; border-radius: 4px; font-family: 'Prompt'; font-size: 0.7rem; cursor: pointer; background: transparent; border: 1px solid var(--border); color: var(--muted); }
  
  /* ADMIN PANEL & FORMS */
  .admin-panel { display: none; margin-bottom: 30px; gap: 16px; flex-direction: column; }
  details { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  summary { padding: 16px 20px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 12px; }
  summary::marker { display: none; content: ''; }
  .form-body { padding: 0 20px 20px; border-top: 1px solid var(--border); padding-top: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
  .field input, .field select { width: 100%; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Prompt'; outline: none; }
  .field input:focus { border-color: var(--accent); }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .plat-cb { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); cursor: pointer; font-size: 0.85rem; }
  .plat-cb input { display: none; }
  .plat-cb.checked { border-color: var(--accent); background: rgba(59,130,246,0.1); color: var(--accent); }
  .btn-add { width: 100%; padding: 12px; background: var(--accent); color: #fff; font-family: 'Prompt'; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }

  /* OVERLAYS & MODALS */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(2,6,23,0.85); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 1.2rem; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
  .btn-cancel, .btn-save { padding: 10px; font-family: 'Prompt'; border-radius: 8px; cursor: pointer; flex:1;}
  .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-save { background: var(--accent); color: #fff; border: none; flex:2; font-weight:600;}

  footer { text-align: center; padding: 32px 24px; color: var(--muted); font-size: 0.85rem; border-top: 1px solid var(--border); background: var(--surface); }
  
  /* Loading UI */
  #loading { text-align: center; padding: 50px; color: var(--accent); grid-column: 1/-1; }
</style>
</head>
<body>

<header>
  <div class="header-container">
    <div class="brand-group">
      <a href="#" class="logo">doo<span>tee</span></a>
      <div class="tagline">ดูอะไร ดูที่ไหน dootee นี่</div>
    </div>
    <div class="search-wrap">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="ค้นหาชื่อหนัง, ซีรีส์ หรือปีที่ฉาย...">
    </div>
    <button id="authBtn" class="auth-btn" onclick="openLoginModal()">Admin Login</button>
  </div>
</header>

<div class="layout-wrapper">
  <aside class="sidebar" id="sidebarLeft"></aside>

  <main class="main-content">
    <div class="admin-panel" id="adminPanel">
      <details id="addDetails">
        <summary>➕ เพิ่มหนัง / ซีรีส์</summary>
        <div class="form-body">
          <div class="form-grid">
            <div class="field" style="grid-column:1/-1"><label>ชื่อเรื่อง *</label><input type="text" id="f_title"></div>
            <div class="field" style="grid-column:1/-1"><label>รูปหน้าปก (URL)</label><input type="url" id="f_poster"></div>
            <div class="field"><label>ชื่อภาษาไทย</label><input type="text" id="f_title_th"></div>
            <div class="field"><label>ปีที่ออกฉาย</label><input type="number" id="f_year"></div>
            <div class="field">
              <label>หมวดหมู่</label>
              <select id="f_genre"><option value="">-- เลือก --</option><option>Action</option><option>Comedy</option><option>Drama</option><option>Horror</option><option>Sci-Fi</option><option>Series</option></select>
            </div>
            <div class="field"><label>ประเทศ</label><input type="text" id="f_country"></div>
          </div>
          <div class="field"><label>เสียงพากย์</label><div class="checkbox-group" id="dubCBs">
            <label class="plat-cb"><input type="checkbox" value="TH">ไทย</label><label class="plat-cb"><input type="checkbox" value="EN">อังกฤษ</label>
          </div></div>
          <div class="field"><label>แพลตฟอร์ม *</label><div class="checkbox-group" id="platCBs">
            <label class="plat-cb"><input type="checkbox" value="netflix">Netflix</label><label class="plat-cb"><input type="checkbox" value="disney">Disney+</label>
            <label class="plat-cb"><input type="checkbox" value="hbo">HBO Max</label><label class="plat-cb"><input type="checkbox" value="prime">Prime</label>
          </div></div>
          <button class="btn-add" onclick="addMovie()">บันทึกข้อมูลหนัง</button>
        </div>
      </details>

      <details id="addAdDetails">
        <summary>🖼️ จัดการป้ายโฆษณา</summary>
        <div class="form-body">
          <div class="field"><label>ตำแหน่ง</label><select id="ad_side"><option value="left">ซ้าย</option><option value="right">ขวา</option></select></div>
          <div class="field"><label>รูปโฆษณา (URL)</label><input type="url" id="ad_img"></div>
          <div class="field"><label>ลิงก์ปลายทาง</label><input type="url" id="ad_link"></div>
          <button class="btn-add" onclick="addAd()" style="background:#1ce783; color:#111;">+ เพิ่มป้ายโฆษณา</button>
        </div>
      </details>
    </div>

    <div class="controls-bar">
      <div class="filter-row">
        <button class="pill active" data-platform="all">ทั้งหมด</button>
        <button class="pill" data-platform="netflix">Netflix</button>
        <button class="pill" data-platform="disney">Disney+</button>
        <button class="pill" data-platform="hbo">HBO Max</button>
        <button class="pill" data-platform="prime">Prime</button>
      </div>
    </div>

    <div class="stats-row">พบข้อมูลทั้งหมด <span id="countNum">0</span> เรื่อง</div>

    <div class="grid" id="movieGrid">
        <div id="loading">กำลังดึงข้อมูลจากฐานข้อมูล Firebase...</div>
    </div>
  </main>

  <aside class="sidebar" id="sidebarRight"></aside>
</div> 

<div class="overlay" id="loginModal">
  <div class="modal" style="max-width: 400px;">
    <h3>🔒 เข้าสู่ระบบ Admin (Firebase)</h3>
    <div class="field"><label>อีเมล (Email)</label><input type="email" id="login_email" placeholder="admin@dootee.com"></div>
    <div class="field"><label>รหัสผ่าน (Password)</label><input type="password" id="login_pass" placeholder="******"></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeLoginModal()">ยกเลิก</button><button class="btn-save" onclick="processLogin()">เข้าสู่ระบบ</button></div>
  </div>
</div>

<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3>✏️ แก้ไขข้อมูลหนัง</h3>
    <input type="hidden" id="e_id">
    <div class="form-grid">
      <div class="field" style="grid-column:1/-1"><label>ชื่อเรื่อง *</label><input type="text" id="e_title"></div>
      <div class="field" style="grid-column:1/-1"><label>รูปหน้าปก (URL)</label><input type="url" id="e_poster"></div>
      <div class="field"><label>ชื่อไทย</label><input type="text" id="e_title_th"></div>
      <div class="field"><label>ปีฉาย</label><input type="number" id="e_year"></div>
      <div class="field"><label>หมวดหมู่</label><select id="e_genre"><option value="">-- เลือก --</option><option>Action</option><option>Comedy</option><option>Drama</option><option>Horror</option><option>Sci-Fi</option><option>Series</option></select></div>
      <div class="field"><label>ประเทศ</label><input type="text" id="e_country"></div>
    </div>
    <div class="field"><label>เสียงพากย์</label><div class="checkbox-group" id="editDubCBs"><label class="plat-cb"><input type="checkbox" value="TH">ไทย</label><label class="plat-cb"><input type="checkbox" value="EN">อังกฤษ</label></div></div>
    <div class="field"><label>แพลตฟอร์ม</label><div class="checkbox-group" id="editPlatCBs"><label class="plat-cb"><input type="checkbox" value="netflix">Netflix</label><label class="plat-cb"><input type="checkbox" value="disney">Disney+</label><label class="plat-cb"><input type="checkbox" value="hbo">HBO Max</label><label class="plat-cb"><input type="checkbox" value="prime">Prime</label></div></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeEditModal()">ยกเลิก</button><button class="btn-save" onclick="saveEdit()">บันทึกแก้ไข</button></div>
  </div>
</div>

<footer>ข้อมูลขับเคลื่อนด้วย Firebase | สร้างด้วย ❤️ โดย dootee</footer>

<script>
// ==========================================================
// --- การตั้งค่า FIREBASE ของคุณ ---
// ==========================================================
const firebaseConfig = {
  apiKey: "AIzaSyBFaJDjOn2FD99BzbLXPaFnnGtR7JwJNsE",
  authDomain: "dootee.firebaseapp.com",
  projectId: "dootee",
  storageBucket: "dootee.firebasestorage.app",
  messagingSenderId: "1046787113656",
  appId: "1:1046787113656:web:e42e64be44f70fd5e2ea4d",
  measurementId: "G-5N5BPFC0PZ"
};

// เริ่มต้น Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const analytics = firebase.analytics();
const auth = firebase.auth(); // ดึงระบบ Authentication มาใช้งาน
// ==========================================================


// --- ระบบ Admin (เชื่อมกับ Firebase Auth) ---
let isAdmin = false;

// โค้ดนี้จะดักจับอัตโนมัติว่าผู้ใช้ล็อกอินค้างไว้หรือไม่
auth.onAuthStateChanged(user => {
  if (user) {
    isAdmin = true; // ล็อกอินสำเร็จ
  } else {
    isAdmin = false; // ยังไม่ได้ล็อกอิน หรือกดออกจากระบบ
  }
  updateAdminUI();
  render(); 
  renderAds();
});

function openLoginModal() {
  if (isAdmin) {
    // ถ้าเข้าระบบอยู่ ให้ทำการออกจากระบบ
    if(confirm('ต้องการออกจากระบบ Admin หรือไม่?')) {
      auth.signOut().then(() => {
        alert('ออกจากระบบเรียบร้อย');
      }).catch((error) => {
        console.error('Logout error', error);
      });
    }
  } else {
    document.getElementById('loginModal').classList.add('open');
  }
}

function closeLoginModal() { 
  document.getElementById('loginModal').classList.remove('open'); 
  document.getElementById('login_email').value=''; 
  document.getElementById('login_pass').value=''; 
}

function processLogin() {
  const email = document.getElementById('login_email').value.trim();
  const pass = document.getElementById('login_pass').value.trim();
  
  // ใช้ Firebase ล็อกอิน
  auth.signInWithEmailAndPassword(email, pass)
    .then((userCredential) => {
      // ล็อกอินสำเร็จ
      closeLoginModal();
      alert('เข้าสู่ระบบ Admin สำเร็จ!');
    })
    .catch((error) => {
      // เกิดข้อผิดพลาด เช่น รหัสผิด หรือไม่มีอีเมลนี้
      const errorCode = error.code;
      if (errorCode === 'auth/invalid-credential' || errorCode === 'auth/wrong-password' || errorCode === 'auth/user-not-found') {
        alert('อีเมลหรือรหัสผ่านไม่ถูกต้อง');
      } else {
        alert('เกิดข้อผิดพลาด: ' + error.message);
      }
    });
}

function updateAdminUI() {
  const btn = document.getElementById('authBtn'); 
  const panel = document.getElementById('adminPanel');
  if (isAdmin) { 
    btn.textContent = 'ออกจากระบบ'; btn.classList.add('logged-in'); panel.style.display = 'flex'; 
  } else { 
    btn.textContent = 'Admin Login'; btn.classList.remove('logged-in'); panel.style.display = 'none'; 
  }
}

// --- ตัวแปรเก็บข้อมูล ---
let movies = [];
let ads = [];
let filterPlatform = 'all';
let searchQ = '';

// --- ดึงข้อมูลจาก Firebase ---
async function loadDataFromFirebase() {
  try {
    const adsSnapshot = await db.collection("ads").get();
    ads = adsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderAds();

    const moviesSnapshot = await db.collection("movies").orderBy("createdAt", "desc").get();
    movies = moviesSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
  } catch (error) {
    console.error("Error loading data: ", error);
    document.getElementById('movieGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;color:red;">ไม่สามารถเชื่อมต่อฐานข้อมูลได้ โปรดตรวจสอบการตั้งค่า Firebase</div>`;
  }
}

// --- โฆษณา ---
async function addAd() {
  if(!isAdmin) return alert('ต้องล็อกอินก่อนครับ');
  const side = document.getElementById('ad_side').value;
  const img = document.getElementById('ad_img').value.trim();
  const link = document.getElementById('ad_link').value.trim();
  if(!img) return alert('กรุณาใส่รูปลิงก์');

  try {
    const newAd = { side, img, link, createdAt: firebase.firestore.FieldValue.serverTimestamp() };
    const docRef = await db.collection("ads").add(newAd);
    ads.push({ id: docRef.id, ...newAd });
    
    document.getElementById('ad_img').value = ''; document.getElementById('ad_link').value = '';
    document.getElementById('addAdDetails').removeAttribute('open');
    renderAds();
  } catch (err) {
    alert('ไม่สามารถเพิ่มได้ (สิทธิ์ถูกปฏิเสธ)');
  }
}

async function deleteAd(id) {
  if(!isAdmin || !confirm('ยืนยันลบโฆษณา?')) return;
  try {
    await db.collection("ads").doc(id).delete();
    ads = ads.filter(a => a.id !== id);
    renderAds();
  } catch (err) {
    alert('ไม่สามารถลบได้ (สิทธิ์ถูกปฏิเสธ)');
  }
}

function renderAds() {
  const left = document.getElementById('sidebarLeft'); const right = document.getElementById('sidebarRight');
  const genHtml = (sideName) => {
    const sAds = ads.filter(a => a.side === sideName);
    if(sAds.length === 0) return isAdmin ? `<div class="ad-item" style="border:1px dashed var(--muted); background:transparent;">พื้นที่โฆษณา ${sideName}</div>` : '';
    return sAds.map(a => `<div class="ad-item">${a.link?`<a href="${a.link}" target="_blank">`:''}<img src="${a.img}">${a.link?`</a>`:''}${isAdmin?`<button class="del-ad-btn" onclick="deleteAd('${a.id}')">ลบ</button>`:''}</div>`).join('');
  };
  if(left) left.innerHTML = genHtml('left');
  if(right) right.innerHTML = genHtml('right');
}

// --- ระบบหนัง ---
async function addMovie() {
  if(!isAdmin) return alert('ต้องล็อกอินก่อนครับ');
  const title = document.getElementById('f_title').value.trim();
  if (!title) return alert('ระบุชื่อเรื่อง');
  const platforms = [...document.querySelectorAll('#platCBs input:checked')].map(c => c.value);
  if (!platforms.length) return alert('เลือกอย่างน้อย 1 แพลตฟอร์ม');

  try {
    const newMovie = {
      title, title_th: document.getElementById('f_title_th').value.trim(),
      poster: document.getElementById('f_poster').value.trim(),
      year: parseInt(document.getElementById('f_year').value) || null,
      genre: document.getElementById('f_genre').value,
      country: document.getElementById('f_country').value.trim(),
      platforms, dubs: [...document.querySelectorAll('#dubCBs input:checked')].map(c => c.value),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    const docRef = await db.collection("movies").add(newMovie);
    movies.unshift({ id: docRef.id, ...newMovie });
    
    ['f_title','f_title_th','f_poster','f_year','f_country'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f_genre').value = '';
    document.querySelectorAll('#platCBs input, #dubCBs input').forEach(cb => { cb.checked = false; cb.closest('.plat-cb').classList.remove('checked'); });
    document.getElementById('addDetails').removeAttribute('open');
    render();
  } catch (err) {
    alert('ไม่สามารถเพิ่มข้อมูลได้ โปรดตรวจสอบสิทธิ์');
  }
}

async function deleteMovie(id) {
  if(!isAdmin || !confirm('ยืนยันลบ?')) return;
  try {
    await db.collection("movies").doc(id).delete();
    movies = movies.filter(m => m.id !== id);
    render();
  } catch (err) {
    alert('ไม่สามารถลบข้อมูลได้ โปรดตรวจสอบสิทธิ์');
  }
}

function openEdit(id) {
  if(!isAdmin) return;
  const m = movies.find(x => x.id === id);
  if(!m) return;
  document.getElementById('e_id').value = id;
  document.getElementById('e_title').value = m.title;
  document.getElementById('e_title_th').value = m.title_th || '';
  document.getElementById('e_poster').value = m.poster || '';
  document.getElementById('e_year').value = m.year || '';
  document.getElementById('e_genre').value = m.genre || '';
  document.getElementById('e_country').value = m.country || '';
  
  document.querySelectorAll('#editPlatCBs input').forEach(cb => { cb.checked = (m.platforms||[]).includes(cb.value); cb.closest('.plat-cb').classList.toggle('checked', cb.checked); });
  document.querySelectorAll('#editDubCBs input').forEach(cb => { cb.checked = (m.dubs||[]).includes(cb.value); cb.closest('.plat-cb').classList.toggle('checked', cb.checked); });
  document.getElementById('editOverlay').classList.add('open');
}
function closeEditModal() { document.getElementById('editOverlay').classList.remove('open'); }

async function saveEdit() {
  if(!isAdmin) return;
  const id = document.getElementById('e_id').value;
  const title = document.getElementById('e_title').value.trim();
  const platforms = [...document.querySelectorAll('#editPlatCBs input:checked')].map(c => c.value);
  
  try {
    const updatedData = { 
      title, title_th: document.getElementById('e_title_th').value.trim(),
      poster: document.getElementById('e_poster').value.trim(),
      year: parseInt(document.getElementById('e_year').value) || null,
      genre: document.getElementById('e_genre').value,
      country: document.getElementById('e_country').value.trim(), 
      platforms, dubs: [...document.querySelectorAll('#editDubCBs input:checked')].map(c => c.value)
    };

    await db.collection("movies").doc(id).update(updatedData);
    
    const idx = movies.findIndex(m => m.id === id);
    if(idx > -1) movies[idx] = { ...movies[idx], ...updatedData };
    
    closeEditModal(); render();
  } catch (err) {
    alert('แก้ไขข้อมูลไม่สำเร็จ โปรดตรวจสอบสิทธิ์');
  }
}

function render() {
  const grid = document.getElementById('movieGrid');
  let filtered = movies.filter(m => {
    const q = searchQ.toLowerCase();
    const matchSearch = !q || m.title.toLowerCase().includes(q) || (m.title_th && m.title_th.toLowerCase().includes(q));
    const matchPlatform = filterPlatform === 'all' || (m.platforms && m.platforms.includes(filterPlatform));
    return matchSearch && matchPlatform;
  });

  document.getElementById('countNum').textContent = filtered.length;

  if (movies.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--muted);">ยังไม่มีข้อมูลในระบบ หรือกำลังโหลด...</div>`;
    return;
  }
  
  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--muted);">ไม่พบผลลัพธ์ที่ค้นหา</div>`;
    return;
  }

  const platLabel = { netflix:'Netflix', disney:'Disney+', hbo:'HBO', prime:'Prime' };

  grid.innerHTML = filtered.map((m, i) => `
    <div class="card" style="animation-delay:${Math.min(i*0.04, 0.4)}s">
      <div class="card-poster">${m.poster ? `<img src="${m.poster}" onerror="this.style.display='none'">` : `<div class="no-poster">No Image</div>`}</div>
      <div class="card-top"><div class="movie-title">${m.title}</div><div class="movie-th">${m.title_th||''}</div><div class="movie-year">${m.year||''}</div></div>
      <div class="platforms">${(m.platforms||[]).map(p => `<span class="platform-tag ${p}">${platLabel[p]||p}</span>`).join('')}</div>
      ${isAdmin ? `<div class="card-actions"><button class="btn-edit" onclick="openEdit('${m.id}')">แก้ไข</button><button class="btn-del" onclick="deleteMovie('${m.id}')">ลบ</button></div>` : ''}
    </div>
  `).join('');
}

document.getElementById('searchInput').addEventListener('input', e => { searchQ = e.target.value; render(); });
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => { document.querySelectorAll('.pill').forEach(b => b.classList.remove('active')); btn.classList.add('active'); filterPlatform = btn.dataset.platform; render(); });
});
function initCBs(c) { if(c) c.querySelectorAll('.plat-cb').forEach(l => { const cb = l.querySelector('input'); cb.addEventListener('change', () => l.classList.toggle('checked', cb.checked)); }); }
initCBs(document.getElementById('platCBs')); initCBs(document.getElementById('editPlatCBs')); initCBs(document.getElementById('dubCBs')); initCBs(document.getElementById('editDubCBs'));

loadDataFromFirebase();
