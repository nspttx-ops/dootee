<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dootee — ดูอะไร ดูที่ไหน dootee นี่</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
  :root {
    --bg: #060b13; --surface: #0b121e; --card: #111a2a; --border: #1e293b;
    --text: #f8fafc; --muted: #94a3b8; --accent: #3b82f6; --accent-hover: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Prompt', sans-serif; min-height: 100vh; overflow-x: hidden; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; padding: 16px 24px; }
  .header-container { max-width: 1600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .logo { font-size: 2rem; font-weight: 700; color: var(--text); text-decoration: none; line-height: 1.1; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.85rem; color: var(--muted); font-weight: 300; margin-top: 2px; }

  .search-wrap { flex: 1; max-width: 500px; position: relative; }
  .search-wrap svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #searchInput { width: 100%; padding: 12px 16px 12px 48px; background: rgba(30,41,59,0.5); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Prompt'; font-size: 1rem; outline: none; }

  .auth-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; }
  .auth-btn.logged-in { background: rgba(239, 68, 68, 0.1); color: #f87171; border-color: rgba(239, 68, 68, 0.3); }

  .layout-wrapper { display: flex; max-width: 1600px; margin: 32px auto 60px; padding: 0 24px; gap: 24px; align-items: flex-start; }
  .main-content { flex-grow: 1; min-width: 0; }
  .sidebar { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 100px; }
  @media(max-width: 1100px) { .sidebar { display: none; } }

  .ad-item { width: 100%; min-height: 250px; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; position: relative; overflow: hidden; display:flex; align-items:center; justify-content:center; color:var(--muted); text-align:center;}
  .ad-item img { width: 100%; height: 100%; object-fit: cover; }
  .del-ad-btn { position: absolute; top: 8px; right: 8px; background: #ef4444; color: white; border: none; border-radius: 6px; padding: 4px 8px; cursor: pointer; z-index: 10; }

  .controls-bar { margin-bottom: 24px; }
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill { padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; }
  .pill.active { background: rgba(59, 130, 246, 0.1); border-color: var(--accent); color: var(--accent); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; transition: .3s; }
  .card:hover { transform: translateY(-6px); border-color: var(--accent); }
  .card-poster { width: 100%; aspect-ratio: 2/3; background: #0b121e; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .card-poster img { width: 100%; height: 100%; object-fit: cover; }
  
  .platform-tag { font-size: 0.65rem; font-weight: 600; padding: 3px 6px; border-radius: 4px; margin-right: 4px; margin-top: 4px; display: inline-block; }
  .platform-tag.netflix { background: rgba(229,9,20,.15); color: #ff6b75; border: 1px solid rgba(229,9,20,.3); }
  .platform-tag.disney { background: rgba(26,120,194,.15); color: #60a5fa; border: 1px solid rgba(26,120,194,.3); }

  .admin-panel { display: none; margin-bottom: 30px; flex-direction: column; gap: 16px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 30px; width: 100%; max-width: 400px; }
  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: var(--muted); }
  .field input { width: 100%; padding: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; }
  .btn-save { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  
  footer { text-align: center; padding: 40px; color: var(--muted); font-size: 0.8rem; }
</style>
</head>
<body>

<header>
  <div class="header-container">
    <div class="brand-group">
      <a href="#" class="logo">doo<span>tee</span></a>
      <div class="tagline">ดูอะไร ดูที่ไหน dootee นี่</div>
    </div>
    <div class="search-wrap">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-left: 15px;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="ค้นหาชื่อหนัง...">
    </div>
    <button id="authBtn" class="auth-btn" onclick="openLoginModal()">Admin Login</button>
  </div>
</header>

<div class="layout-wrapper">
  <aside class="sidebar" id="sidebarLeft"></aside>
  <main class="main-content">
    <div class="admin-panel" id="adminPanel">
      <div style="background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center;">
        <button class="btn-save" onclick="openGoogleSheet()" style="background: #10b981;">📝 แก้ไขข้อมูลใน Google Sheets</button>
      </div>
      <details style="background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px;">
        <summary style="cursor: pointer; font-weight: 600;">🖼️ เพิ่มโฆษณา Sidebar</summary>
        <div class="field" style="margin-top:15px;"><label>ตำแหน่ง</label><select id="ad_side" style="width:100%; padding:8px; background:var(--card); color:white;"><option value="left">ซ้าย</option><option value="right">ขวา</option></select></div>
        <div class="field"><label>รูปลิงก์ (URL)</label><input type="url" id="ad_img"></div>
        <div class="field"><label>ลิงก์ปลายทาง</label><input type="url" id="ad_link"></div>
        <button class="btn-save" onclick="addAd()">+ เพิ่มโฆษณา</button>
      </details>
    </div>

    <div class="controls-bar">
      <div class="filter-row">
        <button class="pill active" data-platform="all">ทั้งหมด</button>
        <button class="pill" data-platform="netflix">Netflix</button>
        <button class="pill" data-platform="disney">Disney+</button>
        <button class="pill" data-platform="hbo">HBO Max</button>
        <button class="pill" data-platform="prime">Prime</button>
      </div>
    </div>
    <div class="stats-row" style="margin-bottom: 15px;">พบทั้งหมด <span id="countNum">0</span> เรื่อง</div>
    <div class="grid" id="movieGrid"><div style="grid-column: 1/-1; text-align: center; padding: 50px;">กำลังโหลด...</div></div>
  </main>
  <aside class="sidebar" id="sidebarRight"></aside>
</div>

<div class="overlay" id="loginModal">
  <div class="modal">
    <h3>🔒 Admin Login</h3>
    <div class="field"><label>Email</label><input type="email" id="login_email"></div>
    <div class="field"><label>Password</label><input type="password" id="login_pass"></div>
    <div style="display:flex; gap:10px;">
      <button onclick="closeLoginModal()" style="flex:1; padding:10px; background:transparent; color:white; border:1px solid var(--border); border-radius:8px; cursor:pointer;">ยกเลิก</button>
      <button class="btn-save" onclick="processLogin()" style="flex:2;">เข้าสู่ระบบ</button>
    </div>
  </div>
</div>

<footer>สร้างด้วย ❤️ โดย dootee | ข้อมูลจาก Google Sheets & Firebase</footer>

<script>
// --- CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyBFaJDjOn2FD99BzbLXPaFnnGtR7JwJNsE",
  authDomain: "dootee.firebaseapp.com",
  projectId: "dootee",
  storageBucket: "dootee.firebasestorage.app",
  messagingSenderId: "1046787113656",
  appId: "1:1046787113656:web:e42e64be44f70fd5e2ea4d",
  measurementId: "G-5N5BPFC0PZ"
};
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTgaibi2KqJK1BFLASNmdhw1Qqw1ZHIu5PotNXaDgosvAzl7qiC3rMCNzeaK0SrZgXCu6WvgihYhPMf/pub?output=csv";
const SHEET_EDIT_URL = "https://docs.google.com/spreadsheets/d/16oH-bmk5egnRakx9bm8vhS85TPeyF9jPq0M3bai-Ef4/edit?gid=0#gid=0";

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let isAdmin = false;
let movies = [];
let ads = [];
let filterPlatform = 'all';
let searchQ = '';

auth.onAuthStateChanged(user => {
  isAdmin = !!user;
  document.getElementById('authBtn').textContent = isAdmin ? 'ออกจากระบบ' : 'Admin Login';
  document.getElementById('authBtn').classList.toggle('logged-in', isAdmin);
  document.getElementById('adminPanel').style.display = isAdmin ? 'flex' : 'none';
  render();
  renderAds();
});

function openLoginModal() { if(isAdmin) auth.signOut(); else document.getElementById('loginModal').classList.add('open'); }
function closeLoginModal() { document.getElementById('loginModal').classList.remove('open'); }
function processLogin() {
  const e = document.getElementById('login_email').value;
  const p = document.getElementById('login_pass').value;
  auth.signInWithEmailAndPassword(e, p).then(() => closeLoginModal()).catch(() => alert('รหัสผ่านผิด'));
}
function openGoogleSheet() { window.open(SHEET_EDIT_URL, '_blank'); }

async function loadData() {
  try {
    const adsSnap = await db.collection("ads").get();
    ads = adsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderAds();

    const res = await fetch(SHEET_CSV_URL);
    const csv = await res.text();
    Papa.parse(csv, {
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        movies = results.data.map((row, i) => ({
          id: i,
          title: row.Title,
          title_th: row.Title_TH,
          poster: row.Poster,
          year: row.Year,
          platforms: row.Platforms ? row.Platforms.split(',').map(s=>s.trim().toLowerCase()) : []
        }));
        render();
      }
    });
  } catch(e) { console.error(e); }
}

function render() {
  const grid = document.getElementById('movieGrid');
  const filtered = movies.filter(m => {
    const q = searchQ.toLowerCase();
    const matchSearch = !q || m.title.toLowerCase().includes(q) || (m.title_th && m.title_th.toLowerCase().includes(q));
    const matchPlatform = filterPlatform === 'all' || m.platforms.includes(filterPlatform);
    return matchSearch && matchPlatform;
  });
  document.getElementById('countNum').textContent = filtered.length;
  const platLabel = { netflix:'Netflix', disney:'Disney+', hbo:'HBO Max', prime:'Prime' };
  
  grid.innerHTML = filtered.map(m => `
    <div class="card">
      <div class="card-poster">${m.poster ? `<img src="${m.poster}" onerror="this.style.display='none'">` : ''}</div>
      <div style="flex-grow:1;">
        <div class="movie-title">${m.title}</div>
        <div style="font-size:0.8rem; color:var(--muted);">${m.title_th || ''}</div>
        <div style="font-size:0.7rem; margin-top:5px;">${m.year || ''}</div>
      </div>
      <div>${m.platforms.map(p => `<span class="platform-tag ${p}">${platLabel[p]||p}</span>`).join('')}</div>
    </div>
  `).join('');
}

async function addAd() {
  const side = document.getElementById('ad_side').value;
  const img = document.getElementById('ad_img').value;
  const link = document.getElementById('ad_link').value;
  if(!img) return;
  const newAd = { side, img, link };
  const doc = await db.collection("ads").add(newAd);
  ads.push({ id: doc.id, ...newAd });
  renderAds();
}

async function deleteAd(id) {
  await db.collection("ads").doc(id).delete();
  ads = ads.filter(a => a.id !== id);
  renderAds();
}

function renderAds() {
  const draw = (side) => {
    const sideAds = ads.filter(a => a.side === side);
    if(sideAds.length === 0) return isAdmin ? `<div class="ad-item">พื้นที่โฆษณา ${side}</div>` : '';
    return sideAds.map(a => `<div class="ad-item"><img src="${a.img}">${isAdmin?`<button class="del-ad-btn" onclick="deleteAd('${a.id}')">ลบ</button>`:''}</div>`).join('');
  };
  document.getElementById('sidebarLeft').innerHTML = draw('left');
  document.getElementById('sidebarRight').innerHTML = draw('right');
}

document.getElementById('searchInput').addEventListener('input', e => { searchQ = e.target.value; render(); });
