<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dootee — ดูอะไร ดูที่ไหน dootee นี่</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="mainHeader">
  <div class="logo-sm">doo<span>tee</span><small>ดูอะไร ดูที่ไหน</small></div>

  <div id="headerSearch">
    <svg class="h-search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="headerSearchInput" placeholder="ค้นหาหนัง...">
    <div class="ac-list" id="headerAC"></div>
  </div>

  <div class="header-right">
    <button id="authBtn" class="auth-btn">Admin Login</button>
  </div>
</header>

<section id="heroSection">
  <div class="hero-logo">doo<span>tee</span></div>
  <div class="hero-tagline">🎬 ดูอะไร ดูที่ไหน dootee นี่</div>

  <div class="hero-search-wrap">
    <svg class="hs-icon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="heroSearchInput" placeholder="ค้นหาชื่อหนัง ซีรีส์...">
    <div class="ac-list" id="heroAC"></div>
  </div>

  <div class="hero-hints" id="heroHints">
    <span class="hint-chip" data-platform="netflix"><span class="plogo netflix">N</span>Netflix</span>
    <span class="hint-chip" data-platform="disney"><span class="plogo disney">D+</span>Disney+</span>
    <span class="hint-chip" data-platform="hbo"><span class="plogo hbo">HBO</span>Max</span>
    <span class="hint-chip" data-platform="prime"><span class="plogo prime">▶</span>Prime</span>
    <span class="hint-chip" data-platform="apple"><span class="plogo apple">TV+</span>Apple</span>
    <span class="hint-chip" data-platform="hulu"><span class="plogo hulu">hulu</span></span>
    <span class="hint-chip" data-platform="youtube"><span class="plogo youtube">▶</span>YouTube</span>
  </div>

  <div class="scroll-hint">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    เลื่อนลงเพื่อดูรายการทั้งหมด
  </div>
</section>

<div id="browseSection">
  <div class="browse-layout">

    <aside class="sidebar" id="sidebarLeft"></aside>

    <main class="browse-main">

      <div class="admin-panel" id="adminPanel">
        <div class="panel-title">⚙️ Admin Panel</div>

        <details class="adm-detail" id="addDetails">
          <summary>➕ เพิ่มหนัง / ซีรีส์</summary>
          <div class="form-body">
            <div class="form-grid">
              <div class="field" style="grid-column:1/-1">
                <label>ชื่อเรื่อง (อังกฤษ) *</label>
                <input type="text" id="f_title" placeholder="เช่น Avengers">
              </div>
              <div class="field" style="grid-column:1/-1">
                <label>รูปโปสเตอร์ (URL)</label>
                <input type="url" id="f_poster" placeholder="https://...">
              </div>
              <div class="field">
                <label>ชื่อภาษาไทย</label>
                <input type="text" id="f_title_th" placeholder="เช่น อเวนเจอร์ส">
              </div>
              <div class="field">
                <label>ปีที่ออกฉาย</label>
                <input type="number" id="f_year" placeholder="2024" min="1900" max="2099">
              </div>
              <div class="field">
                <label>หมวดหมู่</label>
                <select id="f_genre">
                  <option value="">-- เลือก --</option>
                  <option>Action</option><option>Comedy</option><option>Drama</option>
                  <option>Horror</option><option>Romance</option><option>Sci-Fi</option>
                  <option>Thriller</option><option>Animation</option><option>Documentary</option>
                  <option>Fantasy</option><option>Crime</option><option>Series</option>
                </select>
              </div>
              <div class="field">
                <label>ประเทศ</label>
                <input type="text" id="f_country" placeholder="เช่น US, TH, KR">
              </div>
            </div>
            <div class="field">
              <label>เสียงพากย์ / ซับไตเติ้ล</label>
              <div class="cb-group" id="dubCBs">
                <label class="plat-cb"><input type="checkbox" value="พากย์ไทย">🇹🇭 พากย์ไทย</label>
                <label class="plat-cb"><input type="checkbox" value="พากย์อังกฤษ">🇺🇸 พากย์อังกฤษ</label>
                <label class="plat-cb"><input type="checkbox" value="ซับไทย">📝 ซับไทย</label>
                <label class="plat-cb"><input type="checkbox" value="ซับอังกฤษ">📝 ซับอังกฤษ</label>
              </div>
            </div>
            <div class="field" style="margin-top:10px">
              <label>Platform ที่ดูได้ *</label>
              <div class="cb-group" id="platCBs">
                <label class="plat-cb"><input type="checkbox" value="netflix"><span class="plogo netflix" style="height:14px;font-size:.55rem">N</span>Netflix</label>
                <label class="plat-cb"><input type="checkbox" value="disney"><span class="plogo disney" style="height:14px;font-size:.55rem">D+</span>Disney+</label>
                <label class="plat-cb"><input type="checkbox" value="hbo"><span class="plogo hbo" style="height:14px;font-size:.55rem">HBO</span>Max</label>
                <label class="plat-cb"><input type="checkbox" value="prime"><span class="plogo prime" style="height:14px;font-size:.55rem">▶</span>Prime</label>
                <label class="plat-cb"><input type="checkbox" value="apple"><span class="plogo apple" style="height:14px;font-size:.55rem">TV+</span>Apple</label>
                <label class="plat-cb"><input type="checkbox" value="hulu"><span class="plogo hulu" style="height:14px;font-size:.55rem">hulu</span></label>
                <label class="plat-cb"><input type="checkbox" value="youtube"><span class="plogo youtube" style="height:14px;font-size:.55rem">▶</span>YouTube</label>
                <label class="plat-cb"><input type="checkbox" value="other">🟠 อื่นๆ</label>
              </div>
            </div>
            <button class="btn-primary" style="margin-top:14px;width:100%" onclick="addMovie()">💾 บันทึกข้อมูลหนัง</button>
          </div>
        </details>

        <details class="adm-detail" id="addAdDetails">
          <summary>🖼️ จัดการโฆษณา Sidebar</summary>
          <div class="form-body">
            <div class="form-grid">
              <div class="field">
                <label>ตำแหน่ง</label>
                <select
